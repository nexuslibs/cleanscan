name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4 # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig (cross musl linker)
        if: contains(matrix.target, 'linux-musl')
        uses: mlugg/setup-zig@v1 # v1

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'linux-musl')
        run: cargo install cargo-zigbuild

      - name: Build (Linux musl, static)
        if: contains(matrix.target, 'linux-musl')
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (macOS)
        if: contains(matrix.target, 'apple-darwin')
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          BIN="target/${{ matrix.target }}/release/cleanscan"
          tar -czf "cleanscan-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" cleanscan
          shasum -a 256 "cleanscan-${{ matrix.target }}.tar.gz" | cut -d' ' -f1 > "cleanscan-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2 # v2
        with:
          files: |
            cleanscan-${{ matrix.target }}.tar.gz
            cleanscan-${{ matrix.target }}.tar.gz.sha256
