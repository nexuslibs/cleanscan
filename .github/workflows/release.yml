name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to rebuild or republish
        required: false
        type: string
      release_as:
        description: Version to use for a one-time catch-up release (for example 0.15.1)
        required: false
        type: string

concurrency:
  group: release-pipeline
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      should_build: ${{ github.event_name == 'workflow_dispatch' && inputs.release_as != '' && steps.release.outputs.should_build || github.event_name == 'workflow_dispatch' && steps.manual.outputs.should_build || steps.release.outputs.should_build }}
      tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_as != '' && steps.release.outputs.tag_name || github.event_name == 'workflow_dispatch' && steps.manual.outputs.tag_name || steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release_please
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_as != '')
        uses: googleapis/release-please-action@v4
        with:
          # A dedicated token is required when the repository disallows the
          # built-in GITHUB_TOKEN from creating pull requests.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release_as }}

      - name: Select the generated release
        id: release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_as != '')
        env:
          RELEASE_CREATED: ${{ steps.release_please.outputs.release_created }}
          TAG_NAME: ${{ steps.release_please.outputs.tag_name }}
        run: |
          echo "should_build=${RELEASE_CREATED:-false}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Select a manually requested release
        id: manual
        if: github.event_name == 'workflow_dispatch' && inputs.release_as == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag }}
        run: |
          test -n "$TAG_NAME" || {
            echo "Provide either release_as or tag" >&2
            exit 1
          }

          case "$TAG_NAME" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "tag must use the vX.Y.Z format" >&2; exit 1 ;;
          esac

          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" \
              --verify-tag \
              --draft \
              --title "$TAG_NAME" \
              --notes "Manual rebuild of $TAG_NAME."

          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
          - target: i686-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4 # v4
        with:
          ref: ${{ needs.prepare.outputs.tag_name }}
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable # stable
        with:
          targets: ${{ matrix.target }}

      - name: Verify Cargo version matches the release tag
        shell: bash
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          expected="${TAG_NAME#v}"
          actual="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          test "$actual" = "$expected" || {
            echo "Cargo version $actual does not match tag $TAG_NAME" >&2
            exit 1
          }

      - name: Install zig (cross musl linker)
        if: contains(matrix.target, 'linux-musl')
        uses: mlugg/setup-zig@v2 # v2
        with:
          version: latest
          use-cache: false

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'linux-musl')
        run: cargo install cargo-zigbuild

      - name: Build (Linux musl, static)
        if: contains(matrix.target, 'linux-musl')
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (macOS)
        if: contains(matrix.target, 'apple-darwin')
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          test -x "target/${{ matrix.target }}/release/cleanscan"
          tar -czf "cleanscan-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" cleanscan
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "cleanscan-${{ matrix.target }}.tar.gz" | cut -d' ' -f1 > "cleanscan-${{ matrix.target }}.tar.gz.sha256"
          else
            shasum -a 256 "cleanscan-${{ matrix.target }}.tar.gz" | cut -d' ' -f1 > "cleanscan-${{ matrix.target }}.tar.gz.sha256"
          fi

          test "$(tar -tzf "cleanscan-${{ matrix.target }}.tar.gz")" = "cleanscan"
          test "$(cut -d' ' -f1 "cleanscan-${{ matrix.target }}.tar.gz.sha256")" = "$(if command -v sha256sum >/dev/null 2>&1; then sha256sum "cleanscan-${{ matrix.target }}.tar.gz"; else shasum -a 256 "cleanscan-${{ matrix.target }}.tar.gz"; fi | cut -d' ' -f1)"

      - name: Smoke test native Linux artifact
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          archive="cleanscan-${{ matrix.target }}.tar.gz"
          test -f "$archive"
          extract_dir="$(mktemp -d)"
          trap 'rm -rf "$extract_dir"' EXIT
          tar -xzf "$archive" -C "$extract_dir"
          "$extract_dir/cleanscan" --version

      - name: Upload to release
        uses: softprops/action-gh-release@v2 # v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          draft: true
          fail_on_unmatched_files: true
          files: |
            cleanscan-${{ matrix.target }}.tar.gz
            cleanscan-${{ matrix.target }}.tar.gz.sha256

  publish:
    name: Publish release
    needs: [prepare, build]
    if: needs.prepare.outputs.should_build == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the fully built release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest
